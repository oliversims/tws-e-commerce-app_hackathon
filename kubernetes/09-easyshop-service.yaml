# 09-easyshop-service.yaml
# Exposes easyshop pods on port 80 (maps to container 3000); NodePort 30000 for direct node access.

apiVersion: v1
kind: Service
metadata:
  name: easyshop-service
  namespace: easyshop
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30000
  selector:
    app: easyshop
