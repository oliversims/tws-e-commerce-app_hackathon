# 04-configmap.yaml
# Non-sensitive app configuration injected into easyshop pods via envFrom.
# JWT and NEXTAUTH secrets live in 05-secrets.yaml.

apiVersion: v1
kind: ConfigMap
metadata:
  name: easyshop-config
  namespace: easyshop
data:
  MONGODB_URI: "mongodb://mongodb-service:27017/easyshop"
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "https://easyshop.simsoliver.com/api"
  NEXTAUTH_URL: "https://easyshop.simsoliver.com/"
