# 03-mongodb-pvc.yaml
# Dynamic EBS volume — requires terraform stacks 11_ebs-csi-driver + 12_storage-class.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: easyshop
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ebs-storage-class
  resources:
    requests:
      storage: 5Gi
